name: ci

on:
  push:
    tags:
      - 'v*'
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: node scripts/check-version-sync.js
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --all-targets --all-features

  release-build:
    if: startsWith(github.ref, 'refs/tags/')
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            package_dir: npm/linux-x64
            binary_name: unfuk
            asset_name: unfuk-linux-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            package_dir: npm/win32-x64
            binary_name: unfuk.exe
            asset_name: unfuk-win32-x64.exe
          - os: macos-14
            target: aarch64-apple-darwin
            package_dir: npm/darwin-arm64
            binary_name: unfuk
            asset_name: unfuk-darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --target ${{ matrix.target }}
      - name: Stage release asset and npm package
        shell: bash
        run: |
          mkdir -p release
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "release/${{ matrix.asset_name }}"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "${{ matrix.package_dir }}/${{ matrix.binary_name }}"
      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-release-asset
          path: release/${{ matrix.asset_name }}
          if-no-files-found: error
      - name: Upload npm package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-npm-package
          path: ${{ matrix.package_dir }}
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: release-build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/x86_64-unknown-linux-gnu-release-asset/unfuk-linux-x64
            release-artifacts/x86_64-pc-windows-msvc-release-asset/unfuk-win32-x64.exe
            release-artifacts/aarch64-apple-darwin-release-asset/unfuk-darwin-arm64

  npm-publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: release-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - name: Download npm package artifacts
        uses: actions/download-artifact@v4
        with:
          path: npm-artifacts
      - name: Restore staged binaries into package directories
        shell: bash
        run: |
          cp npm-artifacts/x86_64-unknown-linux-gnu-npm-package/unfuk npm/linux-x64/unfuk
          cp npm-artifacts/x86_64-pc-windows-msvc-npm-package/unfuk.exe npm/win32-x64/unfuk.exe
          cp npm-artifacts/aarch64-apple-darwin-npm-package/unfuk npm/darwin-arm64/unfuk
      - name: Publish platform packages
        shell: bash
        run: |
          npm publish ./npm/darwin-arm64 --access public
          npm publish ./npm/linux-x64 --access public
          npm publish ./npm/win32-x64 --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish root package
        shell: bash
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
